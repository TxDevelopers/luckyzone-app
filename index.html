<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Zone</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0f0f0f, #000);
    overflow: hidden;
    color: white;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
  }

  /* ===== INTRO ===== */
  .intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    animation: fadeOut 2.2s ease forwards;
    animation-delay: 2s;
  }

  .jackpot {
    font-size: 60px;
    color: #ffcc00;
    text-shadow: 0 0 20px #ffcc00, 0 0 40px #ff9900;
    transform: scale(0);
    animation: pop 1s ease forwards;
  }

  @keyframes pop { to { transform: scale(1); } }
  @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

  /* ===== HEADER ===== */
  header {
    text-align: center;
    padding: 60px 20px;
    position: relative;
    z-index: 3;
  }

  h1 {
    font-size: 52px;
    color: #ffcc00;
    text-shadow: 0 0 10px #ffcc00, 0 0 30px #ff9900;
  }

  p { opacity: 0.8; }

  .container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
    position: relative;
    z-index: 3;
  }

  .card {
    width: 260px;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,204,0,0.3);
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(255,204,0,0.2);
  }

  .card:hover {
    transform: translateY(-6px) scale(1.05);
  }

  .btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: linear-gradient(90deg, #ffcc00, #ff9900);
    color: black;
    font-weight: bold;
    border-radius: 10px;
    text-decoration: none;
    box-shadow: 0 0 20px #ffcc00;
  }

  /* ===== COMBO ===== */
  #streak {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%) scale(0.8);
    padding: 10px 18px;
    background: rgba(0,0,0,0.6);
    border: 1px solid #ffcc00;
    color: #ffcc00;
    font-weight: bold;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    z-index: 9999;
    opacity: 0;
    transition: 0.25s ease;
    text-shadow: 0 0 10px #ffcc00;
  }

  #streak.show {
    opacity: 1;
    transform: translateX(-50%) scale(1.15);
  }

  #streak.power {
    box-shadow: 0 0 20px #ffcc00, 0 0 40px #ff9900;
    animation: shake 0.25s infinite;
  }

  @keyframes shake {
    0% { transform: translateX(-50%) scale(1.15) translateX(0); }
    25% { transform: translateX(-50%) scale(1.15) translateX(-2px); }
    50% { transform: translateX(-50%) scale(1.15) translateX(2px); }
    75% { transform: translateX(-50%) scale(1.15) translateX(-2px); }
    100% { transform: translateX(-50%) scale(1.15) translateX(0); }
  }

  /* floating text */
  .floatText {
    position: absolute;
    color: #ffcc00;
    font-weight: bold;
    pointer-events: none;
    animation: floatUp 0.8s ease forwards;
    text-shadow: 0 0 10px #ffcc00;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-40px); }
  }

</style>
</head>

<body>

<div class="intro">
  <div class="jackpot">JACKPOT!</div>
</div>

<div id="streak">COMBO x1</div>

<canvas id="bg"></canvas>
<canvas id="fg"></canvas>

<header>
  <h1>Lucky Zone</h1>
  <p>Manage & transfer your funds</p>

  <a class="btn"
  href="https://github.com/TxDevelopers/luckyzone-app/releases/download/v1.0/Lucky.zone.apk">
  Download App
  </a>
</header>

<div class="container">
  <div class="card">Fast Transfers</div>
  <div class="card">Secure System</div>
  <div class="card">Modern UI</div>
</div>

<script>
/* ===== CANVAS ===== */
const bg = document.getElementById("bg");
const fg = document.getElementById("fg");
const bctx = bg.getContext("2d");
const fctx = fg.getContext("2d");

bg.width = fg.width = window.innerWidth;
bg.height = fg.height = window.innerHeight;

/* ===== BACKGROUND EFFECTS ===== */
class Star {
  constructor(){
    this.x=Math.random()*bg.width;
    this.y=Math.random()*bg.height;
    this.vx=-0.2-Math.random()*0.3;
    this.size=Math.random()*2;
  }
  update(){
    this.x+=this.vx;
    if(this.x<0)this.x=bg.width;
  }
  draw(){
    bctx.fillStyle="white";
    bctx.globalAlpha=0.6;
    bctx.beginPath();
    bctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    bctx.fill();
  }
}

class BGCoin {
  constructor(){
    this.x=Math.random()*bg.width;
    this.y=Math.random()*bg.height;
    this.vx=-0.4-Math.random()*0.3;
    this.size=2+Math.random()*2;
  }
  update(){
    this.x+=this.vx;
    if(this.x<0)this.x=bg.width;
  }
  draw(){
    bctx.globalAlpha=0.25;
    bctx.fillStyle="#ffcc00";
    bctx.beginPath();
    bctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    bctx.fill();
  }
}

let stars=[], coinsBG=[];
for(let i=0;i<80;i++) stars.push(new Star());
for(let i=0;i<40;i++) coinsBG.push(new BGCoin());

/* ===== FOREGROUND ===== */
let particles=[];
let combo=0;
let lastClick=0;

const streak=document.getElementById("streak");

function floatText(x,y,val){
  const el=document.createElement("div");
  el.className="floatText";
  el.innerText="+"+val;
  el.style.left=x+"px";
  el.style.top=y+"px";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),800);
}

class Coin{
  constructor(x,y,strong=false){
    this.x=x;
    this.y=y;
    let a=Math.random()*Math.PI*2;
    let s=strong?10:5;
    this.vx=Math.cos(a)*s;
    this.vy=Math.sin(a)*s;
    this.size=strong?5:3;
    this.life=120;
    this.value=strong?5:1;
    this.rewarded=false;
  }

  update(){
    const rect=document.getElementById("downloadBtn").getBoundingClientRect();

    let dx=(rect.left+rect.width/2)-this.x;
    let dy=(rect.top+rect.height/2)-this.y;

    this.vx+=dx*0.0008;
    this.vy+=dy*0.0008;

    this.x+=this.vx;
    this.y+=this.vy;

    this.vx*=0.92;
    this.vy*=0.92;

    this.life--;

    if(Math.hypot(dx,dy)<30 && !this.rewarded){
      floatText(this.x,this.y,this.value);
      this.rewarded=true;
    }
  }

  draw(){
    fctx.fillStyle="#ffcc00";
    fctx.shadowBlur=20;
    fctx.shadowColor="#ffcc00";
    fctx.beginPath();
    fctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    fctx.fill();
  }
}

/* ===== LOOP ===== */
function animate(){
  bctx.clearRect(0,0,bg.width,bg.height);
  stars.forEach(s=>{s.update();s.draw();});
  coinsBG.forEach(c=>{c.update();c.draw();});

  fctx.clearRect(0,0,fg.width,fg.height);
  particles.forEach((p,i)=>{
    p.update();
    p.draw();
    if(p.life<=0)particles.splice(i,1);
  });

  requestAnimationFrame(animate);
}
animate();

/* ===== COMBO SYSTEM ===== */
function updateCombo(){
  streak.style.display="block";
  streak.innerText="COMBO x"+combo;

  streak.classList.add("show");
  if(combo>=3) streak.classList.add("power");
  else streak.classList.remove("power");

  clearTimeout(window.t);
  window.t=setTimeout(()=>{
    combo=0;
    streak.classList.remove("show");
    streak.classList.remove("power");
  },1200);
}

/* ===== EXPLOSION ===== */
function explode(x,y,strong=false){
  let count=strong?60:25;
  for(let i=0;i<count;i++){
    particles.push(new Coin(x,y,strong));
  }
}

/* ===== CLICK ===== */
function handle(x,y){
  let now=Date.now();
  combo=(now-lastClick<400)?combo+1:1;
  lastClick=now;

  updateCombo();
  explode(x,y,combo>=3);
}

window.addEventListener("click",e=>handle(e.clientX,e.clientY));
window.addEventListener("touchstart",e=>{
  let t=e.touches[0];
  handle(t.clientX,t.clientY);
});

window.addEventListener("resize",()=>{
  bg.width=fg.width=window.innerWidth;
  bg.height=fg.height=window.innerHeight;
});
</script>

</body>
</html>
