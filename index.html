<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Zone</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0b0b0b, #000);
  color: white;
  overflow-x: hidden;
}

/* HEADER */
header {
  text-align: center;
  padding: 60px 20px 40px;
}

h1 {
  font-size: 42px;
  color: #ffcc00;
  text-shadow: 0 0 15px #ffcc00;
}

p {
  opacity: 0.75;
  max-width: 500px;
  margin: auto;
}

/* BUTTONS */
.btn {
  display: block;
  width: 220px;
  margin: 15px auto;
  padding: 14px;
  text-decoration: none;
  border-radius: 10px;
  font-weight: bold;
  transition: 0.3s;
}

/* Primary */
.btn-main {
  background: linear-gradient(90deg, #ffcc00, #ff9900);
  color: black;
  box-shadow: 0 0 20px #ffcc00;
}

.btn-main:hover {
  box-shadow: 0 0 40px #ffcc00;
  transform: scale(1.05);
}

/* Secondary */
.btn-alt {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,204,0,0.3);
  color: #ffcc00;
}

.btn-alt:hover {
  background: rgba(255,204,0,0.15);
  transform: scale(1.05);
}

/* CARDS */
.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
  padding: 30px;
}

.card {
  width: 240px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,204,0,0.2);
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 0 25px rgba(255,204,0,0.4);
}

/* FOOTER */
.footer {
  text-align: center;
  opacity: 0.5;
  padding: 30px;
  font-size: 13px;
}

/* MOBILE */
@media(max-width:600px){
  h1 { font-size: 32px; }
  .card { width: 90%; }
}
</style>
</head>

<body>

<header>
  <h1>Lucky Zone</h1>
  <p>Fast, simple and smooth mobile experience designed for ease of use.</p>

  <!-- PRIMARY BUTTON -->
  <a class="btn btn-main"
     href="https://github.com/TxDevelopers/luckyzone-app/releases/download/v1.0/Lucky.zone.apk">
     Download App
  </a>

  <!-- SECONDARY BUTTON -->
  <a class="btn btn-alt"
     href="https://luckyzone.life/join/9F21A5C2" target="_blank">
     Open in Browser
  </a>
</header>

<div class="container">
  <div class="card">⚡ Fast Performance</div>
  <div class="card">🔒 Secure Access</div>
  <div class="card">🎯 Easy to Use</div>
</div>

<div class="footer">
  © 2026 Lucky Zone — All rights reserved
</div>

</body>
</html>
